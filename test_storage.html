<!DOCTYPE html>
<html>
<head>
    <title>Teste Capacidade LocalStorage</title>
</head>
<body>
    <h1>Teste de Capacidade do LocalStorage</h1>
    <div id="resultado"></div>
    
    <script>
        function testLocalStorageCapacity() {
            const resultado = document.getElementById('resultado');
            let html = '<h2>Informações do LocalStorage:</h2>';
            
            // Verificar capacidade típica
            html += '<p><strong>Capacidade típica:</strong> 5-10 MB por domínio (varia por navegador)</p>';
            
            // Verificar dados atuais
            html += '<h3>Dados Atuais:</h3>';
            let totalSize = 0;
            const keys = Object.keys(localStorage);
            
            if (keys.length === 0) {
                html += '<p>Nenhum dado encontrado no localStorage</p>';
            } else {
                html += '<table border="1" style="border-collapse: collapse; margin: 10px 0;">';
                html += '<tr><th>Chave</th><th>Tamanho (KB)</th></tr>';
                
                keys.forEach(key => {
                    const size = new Blob([localStorage[key]]).size;
                    totalSize += size;
                    html += `<tr><td>${key}</td><td>${(size/1024).toFixed(2)} KB</td></tr>`;
                });
                
                html += '</table>';
                html += `<p><strong>Total utilizado:</strong> ${(totalSize/1024).toFixed(2)} KB (${(totalSize/1024/1024).toFixed(4)} MB)</p>`;
            }
            
            // Testar limite
            html += '<h3>Teste de Limite:</h3>';
            try {
                const testKey = 'test_' + Date.now();
                const testData = 'x'.repeat(1024 * 1024); // 1MB
                localStorage.setItem(testKey, testData);
                localStorage.removeItem(testKey);
                html += '<p>✅ Teste 1MB: OK</p>';
            } catch(e) {
                html += `<p>❌ Teste 1MB: ${e.message}</p>`;
            }
            
            // Estimativa de capacidade restante
            try {
                let testSize = 1024 * 1024; // Começa com 1MB
                let maxSize = 0;
                
                while (testSize > 1024) { // Mínimo 1KB
                    try {
                        const testKey = 'capacity_test_' + Date.now();
                        const testData = 'x'.repeat(testSize);
                        localStorage.setItem(testKey, testData);
                        localStorage.removeItem(testKey);
                        maxSize = testSize;
                        testSize += 1024 * 1024; // Adiciona 1MB
                    } catch(e) {
                        testSize = testSize / 2; // Reduz pela metade
                    }
                }
                
                html += `<p><strong>Capacidade estimada disponível:</strong> ${(maxSize/1024/1024).toFixed(2)} MB</p>`;
                
            } catch(e) {
                html += `<p>Erro ao testar capacidade: ${e.message}</p>`;
            }
            
            // Informações por navegador
            html += '<h3>Limites por Navegador (Referência):</h3>';
            html += '<ul>';
            html += '<li><strong>Chrome:</strong> 10 MB</li>';
            html += '<li><strong>Firefox:</strong> 10 MB</li>';
            html += '<li><strong>Safari:</strong> 5 MB</li>';
            html += '<li><strong>Edge:</strong> 10 MB</li>';
            html += '<li><strong>Opera:</strong> 10 MB</li>';
            html += '</ul>';
            
            resultado.innerHTML = html;
        }
        
        // Executar teste
        testLocalStorageCapacity();
    </script>
</body>
</html>
